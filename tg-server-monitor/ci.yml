name: Build and Test Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tg-server-monitor .

      - name: Test Docker image
        run: |
          docker run --rm -e BOT_TOKEN="test_token" tg-server-monitor python -c "print('Build successful')"